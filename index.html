*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font:14px/1.45 Inter,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.stale{background:var(--ink);color:var(--paper);padding:7px 14px;font-size:11.5px;text-align:center}
.wrap{max-width:1240px;margin:0 auto;padding:0 max(clamp(14px,3vw,36px),env(safe-area-inset-right)) 90px max(clamp(14px,3vw,36px),env(safe-area-inset-left))}
/* masthead */
.mast{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:12px 22px;
 padding:clamp(16px,3vh,30px) 0 12px;border-bottom:2px solid var(--ink)}
.mast .left{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 22px;min-width:0}
.mast h1{margin:0;font:400 clamp(26px,4vw,44px)/1 'Instrument Serif',serif;letter-spacing:-.015em}
.mast h1 em{font-style:italic;color:var(--accent)}
.mast .sub{color:var(--sub);font-size:13px}
.mast .sub b{color:var(--ink)}
.mast .score{font:400 clamp(22px,3vw,34px)/1 'Instrument Serif',serif}
.mast .score small{font-size:.5em;color:var(--muted)}

/* rounds */
.grid{display:grid;gap:8px;grid-template-columns:repeat(4,1fr);padding-top:4px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.phase{grid-column:1/-1;width:100%;box-sizing:border-box;min-width:0;display:flex;justify-content:space-between;gap:8px;
 font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
 padding:5px 8px;border-radius:6px;margin:10px 0 2px}
.phase b{font-weight:600}
.phase.p0{background:var(--ph0);color:var(--pht0)}
.phase.p1{background:var(--ph1);color:var(--pht1)}
.phase.p2{background:var(--ph2);color:var(--pht2)}
.phase.sf-h{grid-column:span 2;background:var(--ph3);color:var(--pht3)}
.phase.third-h{grid-column:span 1;background:var(--phT);color:var(--phtT)}
.phase.final-h{grid-column:span 1;background:var(--accent);color:var(--fintext)}
.c{display:flex;align-items:stretch;border:1px solid var(--cardline);background:var(--card);border-radius:6px;
 min-width:0;overflow:hidden;box-shadow:0 1px 3px #11111114}
.c.settled{background:var(--settled);border-color:var(--line);box-shadow:none}
.strip{flex:0 0 auto;width:18px;display:flex;align-items:center;justify-content:center;
 font-weight:800;font-size:12px}
.sc.when{color:var(--muted);font-weight:400}
.rd0 .strip{background:var(--ph0)}
.rd1 .strip{background:var(--ph1)}
.rd2 .strip{background:var(--ph2)}
.rd3 .strip{background:var(--ph3)}
.body{flex:1;min-width:0;padding:5px 8px}
.c.fin{background:var(--fincard);border-color:var(--finline)}
.c.fin .strip{background:var(--accent)}
.c.third .strip{background:var(--phT)}
button.c{appearance:none;text-align:left;cursor:pointer;font:inherit;color:inherit;
 transition:border-color .12s,box-shadow .12s}
button.c:hover{border-color:var(--ink);box-shadow:0 2px 10px #11111114}
.c .t{display:grid;grid-template-columns:18px 1fr auto;gap:6px;align-items:baseline;width:100%;
 text-align:left;padding:2px 2px}
.c .t .nm{font:600 14px/1.3 Inter,sans-serif;letter-spacing:-.005em;
 white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c .t .sc{font-variant-numeric:tabular-nums;font-size:13px;color:var(--sub)}
.c .t.win .sc{color:var(--ink);font-weight:600}
.c .t.lose .nm{color:var(--lose)}
.c .t.fade .nm{color:var(--lose)}
.c .strip.mk-cor{background:var(--ok);color:var(--card)}
.c .strip.mk-known{background:var(--cardline);color:#5c5648}
.c .strip.mk-chosen{background:#141414;color:var(--card)}
.c .strip.mk-needed{background:#E8A23D;color:#3a2705}
.c .strip.mk-wro{background:var(--bad);color:var(--card)}
.c .strip.mk-flip{background:#1B4F9C;color:var(--card)}
.c.feeder{box-shadow:0 0 0 2px #1B4F9C;position:relative;z-index:1}
.c.selected{border-color:#1B4F9C}
.flipbody{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 8px}
.flipbody .pfl{font-size:18px;line-height:1}
.flipbody .pnm{font:600 14px/1.3 Inter,sans-serif;letter-spacing:-.005em}
/* FAB — integrated into header */
.fab{position:relative;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab .main{background:var(--ink);color:var(--paper);font-weight:600;font-size:14px;padding:11px 20px;border-radius:999px;
 white-space:nowrap;transition:transform .12s,box-shadow .12s}
.fab .main:hover{transform:translateY(-2px);box-shadow:0 6px 18px #11111126}
.fab .main.accent{background:var(--accent)}
.sharepop{position:absolute;top:calc(100% + 8px);right:0;z-index:10;background:var(--card);border:1px solid var(--line);
 border-radius:12px;padding:10px;display:flex;gap:8px;box-shadow:0 12px 34px #11111126;flex-wrap:wrap;
 max-width:min(88vw,320px)}
.sharepop input{border:1px solid var(--cardline);padding:9px 11px;font:inherit;flex:1;min-width:140px;border-radius:8px}
.sharepop .cp{background:var(--ink);color:var(--card);padding:9px 14px;border-radius:8px;font-weight:600}
.sharepop .cp.done{background:var(--ok)}
/* narrow (2-col tablet + phone): float the action button out of the header so it can't blow out the masthead */
@media(max-width:1000px){
 .fab{position:fixed;right:calc(24px + env(safe-area-inset-right));bottom:calc(24px + env(safe-area-inset-bottom));z-index:10;align-self:auto}
 .sharepop{top:auto;bottom:calc(100% + 8px)}
 body{padding-bottom:calc(90px + env(safe-area-inset-bottom))}
 /* 2-col: keep each phase header grouped above its own matches (SF block, then 3rd+Final block) */
 .phase.sf-h{order:1}.grid>.c.rd3{order:2}.phase.third-h{order:3}.phase.final-h{order:4}.grid>.c.rd4.third{order:5}.grid>.c.rd4.fin{order:6}}
@media(max-width:520px){.mast{flex-direction:column}
 /* single column: each phase header on its own full-width row, interleaved directly above its card */
 .phase.sf-h{grid-column:1/-1}
 .grid>.c.rd4.third{order:4}.phase.final-h{order:5}}
/* flow overlay */
.flow{position:fixed;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;min-height:100dvh}
.fprog{height:3px;background:var(--line)}.fprog i{display:block;height:100%;background:var(--accent);transition:width .25s}
.fhead{display:flex;justify-content:space-between;align-items:center;gap:10px;
 padding:12px clamp(14px,4vw,40px);font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.fhead .x{font-size:20px;letter-spacing:0;color:var(--ink);padding:4px 10px}
.fstage{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
 overflow-y:auto;overflow-x:hidden;user-select:none;-webkit-user-select:none;cursor:pointer}
.fsplit{width:100%;table-layout:fixed;border-collapse:collapse;will-change:transform;position:relative;z-index:1}
.fhalf{position:absolute;top:0;bottom:0;width:50%;z-index:0;pointer-events:none}
.fhalf-l{left:0}
.fhalf-r{right:0}
.fstage.hoverL .fhalf-l{background:color-mix(in srgb, var(--accent) 8%, transparent)}
.fstage.hoverR .fhalf-r{background:color-mix(in srgb, var(--accent) 8%, transparent)}
.fsplit.anim{transition:transform .28s ease}
.fsplit col{width:50%}
.fsplit td{padding:4px 6px;vertical-align:middle;transition:opacity .18s}
.fsplit tr.fscore td{padding-top:0;padding-bottom:0}
.fsplit tr.fhero td{padding-top:clamp(24px,8vh,64px)}
.fsplit .fl{font-size:clamp(64px,14vw,150px);line-height:1;pointer-events:none}
.fsplit .nm{font:700 clamp(20px,4.4vw,40px)/1.15 Inter,sans-serif;letter-spacing:-.01em;
 pointer-events:none}
.fstat{pointer-events:none;font-size:11px;color:var(--muted);line-height:1.45}
.fstat b{color:var(--sub);font-weight:600}
.fsplit .sideL{text-align:right}
.fsplit .sideR{text-align:left}
.fsplit td.sideL{padding-right:56px}
.fsplit td.sideR{padding-left:56px}
.fsplit tr.fscore{line-height:1}
.scoreCell{display:inline-flex;align-items:baseline;gap:8px;font-size:11px;line-height:1.2;color:var(--muted)}
.scoreCell .sgoal{font-variant-numeric:tabular-nums;color:var(--sub);min-width:1.2em}
.scoreCell.sideL .sgoal{text-align:right}
.scoreCell.sideR .sgoal{text-align:left}
.fsplit td.divider{border-left:1px solid var(--line)}
.fvs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
 width:40px;height:40px;border-radius:50%;background:var(--paper);border:1px solid var(--line);
 display:flex;align-items:center;justify-content:center;
 font:600 13px Inter,sans-serif;color:var(--lose);pointer-events:none}
.ffoot{display:flex;justify-content:center;gap:14px;padding:12px clamp(14px,4vw,40px) calc(12px + env(safe-area-inset-bottom))}
.ffoot button{font-size:13px;color:var(--sub);text-decoration:underline}
@media(max-width:520px){.fsplit .fl{font-size:clamp(48px,18vw,90px)}.fsplit .nm{font-size:clamp(16px,5vw,26px)}

 .fsplit .nm{font-size:clamp(18px,4vh,28px)}.fstat{font-size:10px;line-height:1.35}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}.fab .main:hover{transform:none}}

function buildTeamStats(matches){

 for(const m of matches){

 return h+'<button id="fab" class="main'+(accent?' accent':'')+'">'+label+'</button></div>';}

function render(){
 const S=WC.S;if(!S.feed){app.innerHTML='<div style="padding:40px">Loading…</div>';return;}
 if(inFlow){renderFlow();return;}
 const cmp=WC.evaluate();
 const viewKey=S.view?(S.view.maskCount+'.'+S.view.picks):null;
 if(viewKey!==lastViewKey){selectedIndex=null;lastViewKey=viewKey;}
 feederSet=selectedIndex!==null?new Set(WC.immediateFeeders(selectedIndex)):new Set();
 const done=S.results.filter(r=>r!==null).length;
 const missing=queue().length,total=32-done;
 const dec=cmp?WC.decMaskedBits(S.view):WC.decMerged;
 let h=stale()+'<div class="wrap"><header class="mast"><div class="left">';
 if(cmp)h+='<h1>'+esc(cmp.name||'A bracket')+'<em>.</em></h1>'
  +'<span class="score">'+cmp.pts+'<small> pts · max '+cmp.max+(cmp.rows.some(r=>r.st==='pending')?' · in play':'')+'</small></span>';
 else h+='<h1>The Knockout<em>.</em></h1><span class="sub">World Cup 2026 · <b>'+done+'</b> decided of 32 · <b>'
  +missing+'</b> yours to call'+(missing===0?' · <b>tap Share</b>':'')+'</span>';
 h+='</div>'+fabHTML(cmp,missing)+'</header>';
 const byChrono=arr=>[...arr].sort((a,b)=>WC.chronoRank[a]-WC.chronoRank[b]);
 const GROUPS=[
  ['<span>Round of 32</span><b>1 Point</b>','p0',byChrono([...Array(16).keys()])],
  ['<span>Round of 16</span><b>2 Points</b>','p1',byChrono([16,17,18,19,20,21,22,23])],
  ['<span>Quarterfinals</span><b>4 Points</b>','p2',byChrono([24,25,26,27])]];
 h+='<div class="grid">'+GROUPS.map(([nm,cl,g])=>
   '<div class="phase '+cl+'">'+nm+'</div>'+g.map(i=>cardHTML(i,cmp)).join('')).join('')
  +'<div class="phase sf-h"><span>Semifinals</span><b>8 Points</b></div>'
  +'<div class="phase third-h"><span>Third place</span><b>4 Points</b></div>'
  +'<div class="phase final-h"><span>Final</span><b>16 Points</b></div>'
  +[...byChrono([28,29]),30,31].map(i=>cardHTML(i,cmp)).join('')+'</div>';
 h+='</div>';
 app.innerHTML=h;
 app.querySelectorAll('[data-open]').forEach(el=>{el.onclick=()=>{flowTarget=+el.dataset.open;inFlow=true;render();};});
 app.querySelectorAll('[data-flip]').forEach(el=>{el.onclick=()=>{
  const idx=+el.dataset.flip;
  selectedIndex=(selectedIndex===idx)?null:idx;
  render();};});
 $('#fab').onclick=()=>{
  if(cmp){history.replaceState(null,'',location.pathname);WC.S.view=null;render();return;}
  if(missing>0){flowTarget=null;inFlow=true;render();return;}
  pop=!pop;render();};
 const cp=$('#copy');if(cp)cp.onclick=()=>{
  const url=WC.shareURL(($('#pname').value||'').trim());
  (navigator.clipboard?navigator.clipboard.writeText(url):Promise.reject())
   .then(()=>{cp.textContent='Copied — send it';cp.classList.add('done');})
   .catch(()=>prompt('Copy your bracket link:',url));
  history.replaceState(null,'',url.slice(url.indexOf('#')));};}

function renderFlow(){
 const single=flowTarget!==null;
 let i,n,total;
 if(single){
  i=flowTarget;total=null;n=null;
 } else {
  const q=queue();
  if(q.length===0){inFlow=false;pop=false;render();return;}
  total=32-WC.S.results.filter(r=>r!==null).length;
  n=total-q.length+1;i=q[0];
 }
 const names=WC.namesUnder(i,WC.decMerged);
 const rn=i===30?'Third place':WC.ROUND_NAMES[WC.ROUND(i)];
 const prompt=i===31?'Pick the champion':i===30?'Pick the winner':'Who advances?';
 const statHTML=nm=>{
  if(!nm)return '';
  const r=WC.teamRecord(nm);
  if(!r)return '';
  let lines=['<b>'+r.w+'W–'+r.d+'D–'+r.l+'L</b> · '+(r.gd>=0?'+':'')+r.gd+' goal difference'];
  lines.push(r.avgGoals.toFixed(1)+' goals/game · '+r.cleanSheets+' clean sheet'+(r.cleanSheets!==1?'s':''));
  return lines.join('<br>');
 };
 const sL=names[0]?WC.teamTopScorers(names[0],99):[], sR=names[1]?WC.teamTopScorers(names[1],99):[];
 const scoreRows=Math.max(sL.length,sR.length);
 let scorerTRs='';
 for(let k=0;k<scoreRows;k++){
  const l=sL[k],r=sR[k];
  scorerTRs+='<tr class="fscore"><td class="sideL">'+(l?'<span class="scoreCell sideL"><span class="sname">'+esc(l.name)+'</span><span class="sgoal">'+l.goals+'</span></span>':'')+'</td>'
   +'<td class="sideR divider">'+(r?'<span class="scoreCell sideR"><span class="sgoal">'+r.goals+'</span><span class="sname">'+esc(r.name)+'</span></span>':'')+'</td></tr>';
 }
 app.innerHTML='<div class="flow"><div class="fprog"><i style="width:'+(single?100:(n-1)/total*100)+'%"></i></div>'
  +'<div class="fhead"><span>'+rn+' · '+WC.WEIGHT(i)+' points · '+prompt+'</span>'
  +'<button class="x" id="fx" aria-label="Close">✕</button></div>'
  +'<div class="fstage" id="fstg"><div class="fhalf fhalf-l"></div><div class="fhalf fhalf-r"></div>'
  +'<table class="fsplit" id="fc"><colgroup><col><col></colgroup><tbody>'
  +'<tr class="fhero"><td class="fl sideL">'+WC.flag(names[0])+'</td>'
  +'<td class="fl sideR divider">'+WC.flag(names[1])+'</td></tr>'
  +'<tr><td class="nm sideL">'+esc(names[0])+'</td>'
  +'<td class="nm sideR divider">'+esc(names[1])+'</td></tr>'
  +'<tr><td class="fstat sideL">'+statHTML(names[0])+'</td>'
  +'<td class="fstat sideR divider">'+statHTML(names[1])+'</td></tr>'
  +scorerTRs+'</tbody></table>'
  +'<span class="fvs">v</span></div>'
  +(!single&&n>1?'<div class="ffoot"><button id="fundo">↩ Undo last call</button></div>':'')+'</div>';
 $('#fx').onclick=()=>{inFlow=false;flowTarget=null;render();};
 const undo=$('#fundo');if(undo)undo.onclick=()=>{for(let j=31;j>=0;j--)if(WC.S.picks[j]!==null){WC.clearPick(j);break;}};
 const split=$('#fc');
 const stage=$('#fstg');
 const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
 let committed=false;
 const commit=side=>{
  if(committed)return;committed=true;
  const finish=()=>{if(single){inFlow=false;flowTarget=null;}const ok=WC.pick(i,side);if(!ok)render();};
  if(reduced){finish();return;}
  split.classList.add('anim');
  split.style.transform='translateX('+(side?1:-1)*window.innerWidth+'px)';
  setTimeout(finish,240);};
 stage.addEventListener('click',e=>{
  const r=stage.getBoundingClientRect();
  commit((e.clientX-r.left)<r.width/2?0:1);});
 stage.addEventListener('mousemove',e=>{
  const r=stage.getBoundingClientRect();
  const left=(e.clientX-r.left)<r.width/2;
  stage.classList.toggle('hoverL',left);stage.classList.toggle('hoverR',!left);});
 stage.addEventListener('mouseleave',()=>stage.classList.remove('hoverL','hoverR'));
 document.onkeydown=e=>{
  if(!inFlow)return;
  if(e.key==='ArrowLeft')commit(0);
  else if(e.key==='ArrowRight')commit(1);
  else if(e.key==='Escape'){inFlow=false;flowTarget=null;render();}
  else if(e.key==='Backspace'&&undo){e.preventDefault();undo.click();}};}

WC.onUpdate(render);WC.boot();
</script></body></html>
